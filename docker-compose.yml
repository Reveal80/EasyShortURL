services:
  web:
    image: php:8.3-apache
    container_name: web2
    ports:
      - "8686:80"
      - "8443:443"
    volumes:
      - ./apache/000-default.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./public:/var/www/html
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
